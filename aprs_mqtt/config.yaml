name: "APRS MQTT Tracker"
description: "Connects to APRS-IS and publishes position data to MQTT with Home Assistant auto-discovery."
version: "1.1.0"
slug: "aprs_mqtt"
init: false
arch:
  - aarch64
  - amd64

options:
  aprs_host: "rotate.aprs2.net"
  aprs_port: 14580
  aprs_callsign: "N0CALL"
  aprs_password: "-1"
  callsigns:
    - "N0CALL-9"
    - "N0CALL-10"
    - "N0CALL-11"
    - "N0CALL-12"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "aprs"
  poll_interval: 30
  aprsfi_api_key: ""

schema:
  aprs_host: str
  aprs_port: int
  aprs_callsign: str
  aprs_password: str
  callsigns:
    - str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  mqtt_topic_prefix: str
  poll_interval: int
  aprsfi_api_key: str
